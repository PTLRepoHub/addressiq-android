name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sdk:
    name: SDK · unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10"
      - run: gradle test --no-daemon

  example:
    name: "Example · ${{ matrix.lang }} · assembleDebug (local SDK)"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        lang: [kotlin, java]
    defaults:
      run:
        working-directory: examples/${{ matrix.lang }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10"
      # `includeBuild("../..")` links the local SDK via dependency substitution.
      - run: gradle assembleDebug --no-daemon
